[tool.ruff]
target-version = "py313"
line-length = 100
include = [
    "custom_components/**/*.py",
    "tests/**/*.py",
    "aiogardenasmart/**/*.py",
    "aioautomower/**/*.py",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "RUF", "SIM"]

[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
warn_unreachable = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["custom_components/gardena_smart_system"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]
